<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="100%" height="100%" fill="#0b0f13"/>
  <text x="40" y="60" fill="#ffffff" font-family="Arial" font-size="34" font-weight="700">AI Slack Prediction Engine</text>
  <text x="40" y="95" fill="#9aa3ad" font-family="Arial" font-size="16">Predict timing slack based on design parameters</text>

  <!-- Logic Depth control -->
  <rect x="40" y="120" rx="6" ry="6" width="700" height="44" fill="#1f2933" stroke="#2b3440"/>
  <text x="56" y="150" fill="#cbd5de" font-size="14">Logic Depth</text>
  <rect x="620" y="126" width="44" height="32" fill="#111419" rx="4"/>
  <text x="634" y="150" fill="#cbd5de" font-size="16">22</text>

  <!-- Fanout control -->
  <rect x="40" y="180" rx="6" ry="6" width="700" height="44" fill="#1f2933" stroke="#2b3440"/>
  <text x="56" y="210" fill="#cbd5de" font-size="14">Fanout</text>
  <rect x="620" y="186" width="44" height="32" fill="#111419" rx="4"/>
  <text x="634" y="210" fill="#cbd5de" font-size="16">10</text>

  <!-- Predict Button -->
  <rect x="40" y="250" width="140" height="40" rx="6" fill="#0b6bff"/>
  <text x="72" y="277" fill="#fff" font-size="14">Predict Slack</text>

  <!-- Predicted Slack -->
  <g>
    <text x="40" y="330" fill="#ff7ab6" font-size="16">📌 Predicted Slack:</text>
    <rect x="190" y="312" width="60" height="28" rx="6" fill="#1f7a52"/>
    <text x="204" y="333" fill="#e6fff3" font-size="13">0.191</text>
  </g>

  <!-- Risk banner -->
  <rect x="40" y="360" width="1100" height="60" rx="8" fill="#6b5d10"/>
  <text x="60" y="400" fill="#fff" font-family="Arial" font-size="18">⚠ Risk Level: MEDIUM</text>

  <!-- small file chip at top -->
  <rect x="840" y="20" width="280" height="36" rx="6" fill="#111217" stroke="#2b2f35"/>
  <text x="855" y="44" fill="#cbd5de" font-size="13">sample_report.rpt • 320.0B</text>

</svg>
